<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Job Application Form</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- CSS -->
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container mt-5">
<h2 class="text-center">Job Application Form</h2>

<form onsubmit="return validateForm()">

<fieldset>
<legend>Personal Information</legend>

<div class="mb-3">
<label class="form-label">Full Name</label>
<input type="text" id="fullname" class="form-control">
</div>

<div class="mb-3">
<label class="form-label">Email</label>
<input type="email" id="email" class="form-control">
</div>

<div class="mb-3">
<label class="form-label">Telephone</label>
<input type="tel" id="telephone" class="form-control">
</div>

<div class="mb-3">
<label class="form-label">Address</label>
<input type="text" class="form-control">
</div>

</fieldset>


<fieldset>
<legend>Position Information</legend>

<div class="mb-3">
<label class="form-label">Desired Job</label>

<select class="form-control">
<option>Account Executive</option>
<option>Business Development</option>
<option>Inside Sales</option>
<option>Sales Manager</option>
<option>VP Sales</option>
</select>
</div>

<label>Employment Type</label>

<div class="form-check">
<input class="form-check-input" type="radio" name="employment">
<label class="form-check-label">Part-time contract</label>
</div>

<div class="form-check">
<input class="form-check-input" type="radio" name="employment">
<label class="form-check-label">Part-time permanent</label>
</div>

<div class="form-check">
<input class="form-check-input" type="radio" name="employment">
<label class="form-check-label">Full-time contract</label>
</div>

<div class="form-check">
<input class="form-check-input" type="radio" name="employment">
<label class="form-check-label">Full-time permanent</label>
</div>

</fieldset>


<fieldset>
<legend>Areas of Interest</legend>

<div class="form-check">
<input class="form-check-input interest" type="checkbox">
<label class="form-check-label">Account Executive</label>
</div>

<div class="form-check">
<input class="form-check-input interest" type="checkbox">
<label class="form-check-label">Business Development</label>
</div>

<div class="form-check">
<input class="form-check-input interest" type="checkbox">
<label class="form-check-label">Inside Sales</label>
</div>

<div class="form-check">
<input class="form-check-input interest" type="checkbox">
<label class="form-check-label">Sales Manager</label>
</div>

<div class="form-check">
<input class="form-check-input interest" type="checkbox">
<label class="form-check-label">VP Sales</label>
</div>

</fieldset>


<fieldset>
<legend>Relocation</legend>

<div class="form-check">
<input class="form-check-input" type="radio" name="relocation">
<label class="form-check-label">Yes</label>
</div>

<div class="form-check">
<input class="form-check-input" type="radio" name="relocation">
<label class="form-check-label">No</label>
</div>

</fieldset>


<fieldset>
<legend>Additional Message</legend>

<textarea class="form-control"></textarea>

</fieldset>

<br>

<button type="submit" class="btn btn-primary">Submit</button>
<button type="reset" class="btn btn-secondary">Reset</button>

</form>
</div>

<script src="script.js"></script>

</body>
</html>
